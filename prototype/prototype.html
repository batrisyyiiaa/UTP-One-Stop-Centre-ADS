<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>UTP OSC Queue System</title>
<style>
  :root {
    --sapphire: #0B2F6B;
    --sapphire-light: #E8EDF6;
    --gold: #C8A951;
    --gold-light: #FBF5E6;
    --text-primary: #1A1D23;
    --text-secondary: #5B616E;
    --text-dim: #9298A3;
    --border: #E1E4E9;
    --bg: #F5F6F8;
    --card: #FFFFFF;
    --red: #C0392B;
    --red-light: #FBEAE8;
    --font: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text-primary);
    font-family: var(--font);
    min-height: 100vh;
  }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 28px;
    background: var(--sapphire);
    color: white;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .brand-mark {
    width: 34px;
    height: 34px;
    border-radius: 6px;
    background: var(--gold);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 14px;
    color: var(--sapphire);
    flex-shrink: 0;
  }

  .brand-title {
    font-size: 15px;
    font-weight: 600;
    line-height: 1.2;
  }

  .brand-sub {
    font-size: 11.5px;
    color: rgba(255,255,255,0.7);
  }

  .tabs {
    display: flex;
    gap: 4px;
    background: rgba(255,255,255,0.1);
    padding: 4px;
    border-radius: 8px;
  }

  .tab-btn {
    font-family: var(--font);
    font-size: 13px;
    font-weight: 600;
    padding: 8px 16px;
    border-radius: 6px;
    border: none;
    background: transparent;
    color: rgba(255,255,255,0.7);
    cursor: pointer;
  }

  .tab-btn.active {
    background: white;
    color: var(--sapphire);
  }

  .view { display: none; padding: 28px; }
  .view.active { display: block; }

  /* ===== QUEUE DISPLAY VIEW ===== */
  .display-wrap {
    max-width: 900px;
    margin: 0 auto;
  }

  .now-serving-card {
    background: var(--sapphire);
    color: white;
    border-radius: 14px;
    padding: 32px;
    text-align: center;
    margin-bottom: 24px;
  }

  .now-serving-label {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 8px;
  }

  .now-serving-number {
    font-size: 56px;
    font-weight: 700;
    line-height: 1;
  }

  .now-serving-service {
    font-size: 13px;
    color: rgba(255,255,255,0.75);
    margin-top: 6px;
  }

  .display-controls {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-bottom: 28px;
  }

  .btn {
    font-family: var(--font);
    font-size: 13.5px;
    font-weight: 600;
    padding: 10px 18px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
  }

  .btn-primary { background: var(--sapphire); color: white; }
  .btn-gold { background: var(--gold); color: var(--sapphire); }
  .btn-outline { background: white; color: var(--text-primary); border: 1px solid var(--border); }

  .section-title {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    color: var(--text-secondary);
    margin-bottom: 12px;
  }

  .ticket-row {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .ticket-position {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: var(--sapphire-light);
    color: var(--sapphire);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    flex-shrink: 0;
  }

  .ticket-number {
    font-weight: 600;
    font-size: 14px;
    min-width: 60px;
  }

  .ticket-service {
    font-size: 12.5px;
    color: var(--text-secondary);
    flex: 1;
  }

  .ticket-student {
    font-size: 12px;
    color: var(--text-dim);
  }

  .wait-time {
    font-size: 11.5px;
    font-weight: 600;
    color: var(--sapphire);
    font-variant-numeric: tabular-nums;
    min-width: 40px;
    text-align: right;
  }

  .empty-note {
    text-align: center;
    padding: 30px;
    color: var(--text-dim);
    font-size: 13px;
    background: var(--card);
    border: 1px dashed var(--border);
    border-radius: 10px;
  }

  /* ===== MY TICKET VIEW (phone) ===== */
  .ticket-app-wrap {
    display: flex;
    justify-content: center;
    padding-top: 12px;
  }

  .student-picker {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 18px;
    justify-content: center;
  }

  select {
    font-family: var(--font);
    font-size: 13px;
    font-weight: 500;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    color: var(--text-primary);
  }

  .phone {
    width: 340px;
    background: var(--card);
    border-radius: 26px;
    border: 1px solid var(--border);
    box-shadow: 0 12px 32px rgba(11,47,107,0.12);
    overflow: hidden;
  }

  .phone-status {
    background: var(--text-primary);
    color: white;
    font-size: 11px;
    padding: 7px 18px;
    display: flex;
    justify-content: space-between;
  }

  .phone-header {
    padding: 18px 20px;
    background: var(--sapphire);
    color: white;
  }

  .phone-header-label {
    font-size: 11.5px;
    color: rgba(255,255,255,0.65);
  }

  .phone-ticket-number {
    font-size: 30px;
    font-weight: 700;
    margin-top: 2px;
  }

  .phone-body {
    padding: 20px;
  }

  .status-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }

  .status-row:last-of-type { border-bottom: none; }

  .status-label { font-size: 12.5px; color: var(--text-secondary); }
  .status-value { font-size: 13.5px; font-weight: 600; }

  .cancel-btn {
    width: 100%;
    margin-top: 16px;
    padding: 12px;
    background: var(--red-light);
    color: var(--red);
    border: none;
    border-radius: 10px;
    font-family: var(--font);
    font-size: 13.5px;
    font-weight: 600;
    cursor: pointer;
  }

  .no-ticket-note {
    text-align: center;
    padding: 30px 16px;
    color: var(--text-dim);
    font-size: 12.5px;
  }

  .service-prompt {
    font-size: 12.5px;
    font-weight: 600;
    color: var(--text-secondary);
    margin-bottom: 12px;
  }

  .name-input {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-family: var(--font);
    font-size: 13.5px;
    color: var(--text-primary);
  }

  .name-input:focus {
    outline: none;
    border-color: var(--sapphire);
  }

  .service-btn {
    width: 100%;
    padding: 14px;
    margin-bottom: 10px;
    background: var(--sapphire-light);
    color: var(--sapphire);
    border: 1px solid var(--sapphire);
    border-radius: 10px;
    font-family: var(--font);
    font-size: 13.5px;
    font-weight: 600;
    cursor: pointer;
    text-align: left;
  }

  .service-btn:hover { background: var(--sapphire); color: white; }

  .toast {
    position: fixed;
    bottom: 22px;
    left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: var(--text-primary);
    color: white;
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 13px;
    opacity: 0;
    transition: all 0.2s ease;
    pointer-events: none;
    z-index: 50;
  }

  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <div>
      <div class="brand-title">UTP One Stop Centre</div>
      <div class="brand-sub">Queue Management System</div>
    </div>
  </div>
  <div class="tabs">
    <button class="tab-btn active" id="tabBtnDisplay" onclick="switchTab('display')">Queue Display</button>
    <button class="tab-btn" id="tabBtnTicket" onclick="switchTab('ticket')">My Ticket</button>
  </div>
</div>

<div class="view active" id="viewDisplay">
  <div class="display-wrap">
    <div class="now-serving-card">
      <div class="now-serving-label">Now Serving</div>
      <div class="now-serving-number" id="nowServingNumber">-</div>
      <div class="now-serving-service" id="nowServingService"></div>
    </div>

    <div class="display-controls">
      <button class="btn btn-gold" onclick="serveNext()">Serve Next</button>
      <button class="btn btn-outline" onclick="addWalkIn()">New Ticket</button>
    </div>

    <div class="section-title">Waiting</div>
    <div id="waitingList"></div>
  </div>
</div>

<div class="view" id="viewTicket">
  <div class="student-picker">
    <span style="font-size:12.5px; color:var(--text-secondary); font-weight:600;">Viewing as</span>
    <select id="studentPicker" onchange="renderTicketApp()"></select>
  </div>

  <div class="ticket-app-wrap">
    <div class="phone">
      <div class="phone-status"><span>9:41</span><span>●●●</span></div>
      <div class="phone-header">
        <div class="phone-header-label">Your Ticket</div>
        <div class="phone-ticket-number" id="phoneTicketNumber">-</div>
      </div>
      <div class="phone-body" id="phoneBody"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let ticketCounter = 1;
let queue = [];
let nowServing = null;

const sampleStudents = ["Alia", "Wei Jian", "Farhan", "Sofea", "Aiman", "Kavya", "Danish", "Ilyana"];
const services = ["Sticker Registration", "Student ID Card"];

function makeTicket(studentId, service) {
  return {
    ticketNumber: ticketCounter++,
    studentId: studentId,
    token: "token-" + Math.random().toString(36).substring(2, 9),
    service: service || services[Math.floor(Math.random() * services.length)],
    issuedAt: Date.now(),
    resolvedAt: null,
    cancelledAt: null
  };
}

function formatElapsed(ms) {
  const totalSeconds = Math.floor(ms / 1000);
  const minutes = Math.floor(totalSeconds / 60);
  const seconds = totalSeconds % 60;
  if (minutes === 0) return seconds + "s";
  return minutes + "m " + seconds + "s";
}

function seedData() {
  const seedNames = ["Alia", "Wei Jian", "Farhan", "Sofea", "Aiman"];
  seedNames.forEach(name => queue.push(makeTicket(name)));
  nowServing = null;
}

function switchTab(tab) {
  document.getElementById('viewDisplay').classList.toggle('active', tab === 'display');
  document.getElementById('viewTicket').classList.toggle('active', tab === 'ticket');
  document.getElementById('tabBtnDisplay').classList.toggle('active', tab === 'display');
  document.getElementById('tabBtnTicket').classList.toggle('active', tab === 'ticket');
  if (tab === 'ticket') renderTicketApp();
}

function renderDisplay() {
  document.getElementById('nowServingNumber').textContent = nowServing ? nowServing.ticketNumber : "-";
  document.getElementById('nowServingService').textContent = nowServing
    ? nowServing.service + " (waited " + formatElapsed(nowServing.resolvedAt - nowServing.issuedAt) + ")"
    : "No ticket being served";

  const list = document.getElementById('waitingList');
  if (queue.length === 0) {
    list.innerHTML = `<div class="empty-note">No tickets waiting</div>`;
    return;
  }

  list.innerHTML = queue.map((t, i) => `
    <div class="ticket-row">
      <div class="ticket-position">${i + 1}</div>
      <div class="ticket-number">#${t.ticketNumber}</div>
      <div class="ticket-service">${t.service}</div>
      <div class="ticket-student">${t.studentId}</div>
      <div class="wait-time" data-issued="${t.issuedAt}">0s</div>
    </div>
  `).join("");
}

function populateStudentPicker(selectToken) {
  const picker = document.getElementById('studentPicker');
  const existingOptions = queue.map(t => `<option value="${t.token}">${t.studentId} (#${t.ticketNumber})</option>`).join("");
  picker.innerHTML = `<option value="__new__">Join Queue (New Ticket)</option>` + existingOptions;
  if (selectToken) picker.value = selectToken;
}

function renderTicketApp(selectToken) {
  const picker = document.getElementById('studentPicker');
  const tokenToSelect = selectToken || picker.value || "__new__";
  populateStudentPicker(tokenToSelect);
  const token = picker.value;

  if (token === "__new__") {
    document.getElementById('phoneTicketNumber').textContent = "-";
    document.getElementById('phoneBody').innerHTML = `
      <div class="service-prompt">Your name</div>
      <input type="text" id="nameInput" class="name-input" placeholder="Enter your name">
      <div class="service-prompt" style="margin-top:14px;">Choose a service</div>
      <button class="service-btn" onclick="joinQueue('Student ID Card')">Student ID Card</button>
      <button class="service-btn" onclick="joinQueue('Vehicle / Micromobility Sticker')">Vehicle / Micromobility Sticker</button>
    `;
    return;
  }

  const ticket = queue.find(t => t.token === token);

  if (!ticket) {
    document.getElementById('phoneTicketNumber').textContent = "-";
    document.getElementById('phoneBody').innerHTML = `<div class="no-ticket-note">No ticket to display</div>`;
    return;
  }

  const position = queue.findIndex(t => t.token === token) + 1;
  document.getElementById('phoneTicketNumber').textContent = "#" + ticket.ticketNumber;
  document.getElementById('phoneBody').innerHTML = `
    <div class="status-row">
      <div class="status-label">Service</div>
      <div class="status-value">${ticket.service}</div>
    </div>
    <div class="status-row">
      <div class="status-label">Position in queue</div>
      <div class="status-value">${position}</div>
    </div>
    <div class="status-row">
      <div class="status-label">People ahead</div>
      <div class="status-value">${position - 1}</div>
    </div>
    <div class="status-row">
      <div class="status-label">Waiting</div>
      <div class="status-value wait-time" data-issued="${ticket.issuedAt}">0s</div>
    </div>
    <button class="cancel-btn" onclick="cancelTicket('${ticket.token}')">Cancel Ticket</button>
  `;
}

function joinQueue(service) {
  const nameInput = document.getElementById('nameInput');
  const name = (nameInput && nameInput.value.trim()) ? nameInput.value.trim() : "Guest";
  const ticket = makeTicket(name, service);
  queue.push(ticket);
  showToast("Ticket #" + ticket.ticketNumber + " issued for " + service);
  renderDisplay();
  renderTicketApp(ticket.token);
}

function serveNext() {
  if (queue.length === 0) return;
  nowServing = queue.shift();
  nowServing.resolvedAt = Date.now();
  showToast("Now serving #" + nowServing.ticketNumber);
  renderDisplay();
  renderTicketApp();
}

function addWalkIn() {
  const name = sampleStudents[Math.floor(Math.random() * sampleStudents.length)];
  const ticket = makeTicket(name);
  queue.push(ticket);
  showToast("Ticket #" + ticket.ticketNumber + " issued");
  renderDisplay();
  renderTicketApp();
}

function cancelTicket(token) {
  const index = queue.findIndex(t => t.token === token);
  if (index === -1) return;
  const ticket = queue[index];
  ticket.cancelledAt = Date.now();
  const waited = formatElapsed(ticket.cancelledAt - ticket.issuedAt);
  queue.splice(index, 1);
  showToast("Ticket #" + ticket.ticketNumber + " cancelled after waiting " + waited);
  renderDisplay();
  renderTicketApp();
}

function showToast(message) {
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.classList.add('show');
  clearTimeout(toast._timer);
  toast._timer = setTimeout(() => toast.classList.remove('show'), 2000);
}

function updateLiveWaitTimes() {
  document.querySelectorAll('.wait-time').forEach(el => {
    const issued = parseInt(el.getAttribute('data-issued'));
    if (!issued) return;
    el.textContent = formatElapsed(Date.now() - issued);
  });
}
setInterval(updateLiveWaitTimes, 1000);

seedData();
renderDisplay();
populateStudentPicker();
renderTicketApp();
</script>

</body>
</html>
